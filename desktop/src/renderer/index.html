<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>VPN-Like Proxy</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 16px; }
    .row { display: flex; gap: 12px; align-items: center; }
    .badge { padding: 4px 8px; border-radius: 6px; background:#eee; }
    #logs { height: 320px; overflow: auto; border: 1px solid #ddd; padding: 8px; border-radius: 6px; background:#fafafa; }
    button { padding: 8px 12px; border: 0; border-radius: 8px; background: #4f46e5; color: white; cursor: pointer; }
    button.secondary { background: #475569; }
  </style>
</head>
<body>
  <h2>VPN-Like Proxy</h2>
  <div class="row">
    <span>Shim:</span><span id="shim" class="badge">stopped</span>
    <span>Proxy:</span><span id="proxy" class="badge">off</span>
  </div>
  <p/>
  <div class="row">
    <button onclick="bridgeStart()">Connect</button>
    <button class="secondary" onclick="bridgeStop()">Disconnect</button>
    <button onclick="bridgeEnablePAC()">Enable PAC</button>
    <button class="secondary" onclick="bridgeDisableProxy()">Disable Proxy</button>
  </div>
  <p/>
  <div id="logs"></div>
  <script src="renderer.js"></script>
</body>
</html>
